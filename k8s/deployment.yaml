apiVersion: v1
kind: Service
metadata:
  name: musang-fums-app-service
  namespace: fums-dev-ns
  labels:
    app: musang-fums-app
spec:
  selector:
    app: musang-fums-app
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: musang-fums-app-config
  namespace: fums-dev-ns
data:
  NODE_ENV: "production"
  API_BASE_URL: "https://musang-fums-api-service:80"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: musang-fums-app
  namespace: fums-dev-ns
  labels:
    app: musang-fums-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: musang-fums-app
  template:
    metadata:
      labels:
        app: musang-fums-app
    spec:
      containers:
      - name: musang-fums-app
        image: bpitmACRdev.azurecr.io/musang-fums-app:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: musang-fums-app-config
              key: NODE_ENV
        # Health checks
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: musang-fums-app-ingress
  namespace: fums-dev-ns
  annotations:
    spec.ingressClassName: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - fums.banpuindo.co.id
    secretName: musang-fums-app-tls
  rules:
  - host: fums.banpuindo.co.id
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: musang-fums-app-service
            port:
              number: 80
